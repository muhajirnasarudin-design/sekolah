<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar EduSchool Premium</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    color:#1565c0;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    background:#1565c0;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

a{
    text-decoration:none;
    color:#1565c0;
}
</style>

</head>
<body>

<div class="container">

<h2>Daftar EduSchool</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="registerBtn">
Daftar Gratis 2 Hari
</button>

<p style="text-align:center;margin-top:15px;">
Sudah punya akun?
<a href="login.html">Login</a>
</p>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
