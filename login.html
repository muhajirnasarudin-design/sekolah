<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login EduSchool</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
<h2>Login EduSchool</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>
Belum punya akun?
<a href="register.html">Daftar</a>
</p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
