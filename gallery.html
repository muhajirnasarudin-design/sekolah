<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery - EduSchool Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* FORM */
.form-grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

input, textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

textarea{
min-height:80px;
}

/* BUTTON */
.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.photo-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.photo-card img{
width:100%;
height:150px;
object-fit:cover;
}

.photo-body{
padding:10px;
}

.photo-title{
font-weight:bold;
font-size:14px;
}

.photo-desc{
font-size:12px;
color:#666;
margin-top:5px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1 class="title">🖼 Gallery Sekolah</h1>

<a href="dashboard.html">
<button class="btn btn-primary">⬅ Dashboard</button>
</a>
</div>

<!-- UPLOAD FORM -->
<div class="card">

<h3>Upload Foto</h3><br>

<div class="form-grid">

<input type="text" id="title" placeholder="Judul foto">

<textarea id="desc" placeholder="Deskripsi..."></textarea>

<input type="text" id="imageUrl" placeholder="URL gambar (https://...)">

</div>

<br>

<button class="btn btn-primary" id="uploadBtn">
Upload
</button>

</div>

<!-- GALLERY LIST -->
<div class="card">

<h3>📸 Galeri</h3><br>

<div class="gallery" id="galleryList">

<p style="color:#666;">Belum ada foto</p>

</div>

</div>

<script type="module" src="gallery.js"></script>

</body>
</html>
