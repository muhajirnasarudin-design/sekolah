<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EduSchool Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
}

.sidebar{
width:270px;
height:100vh;
background:#0f172a;
position:fixed;
color:white;
padding:25px;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:35px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
margin-bottom:8px;
border-radius:12px;
color:white;
text-decoration:none;
transition:.3s;
}

.menu a:hover{
background:#1e293b;
}

.main{
margin-left:270px;
width:100%;
padding:25px;
}

.topbar{
background:white;
padding:15px 25px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 15px rgba(0,0,0,.05);
}

.search{
background:#f1f5f9;
padding:10px 15px;
border-radius:10px;
width:300px;
}

.search input{
border:none;
background:none;
outline:none;
width:100%;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.cards{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 3px 15px rgba(0,0,0,.05);
}

.card-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.icon{
width:55px;
height:55px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.blue{background:#dbeafe;color:#2563eb;}
.green{background:#dcfce7;color:#16a34a;}
.orange{background:#ffedd5;color:#ea580c;}
.purple{background:#ede9fe;color:#7c3aed;}

.number{
font-size:32px;
font-weight:700;
margin-top:10px;
}

.section{
margin-top:25px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 3px 15px rgba(0,0,0,.05);
}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-school"></i>
EduSchool
</div>

<div class="menu">
<a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
<a href="#"><i class="fa-solid fa-user-graduate"></i> Siswa</a>
<a href="#"><i class="fa-solid fa-chalkboard-user"></i> Guru</a>
<a href="#"><i class="fa-solid fa-book"></i> Mata Pelajaran</a>
<a href="#"><i class="fa-solid fa-calendar-check"></i> Absensi</a>
<a href="#"><i class="fa-solid fa-square-poll-vertical"></i> Nilai</a>
<a href="#"><i class="fa-solid fa-newspaper"></i> Berita</a>
<a href="#"><i class="fa-solid fa-image"></i> Galeri</a>
<a href="#"><i class="fa-solid fa-credit-card"></i> Langganan</a>
<a href="#"><i class="fa-solid fa-gear"></i> Pengaturan</a>
<a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

</div>

<div class="main">

<div class="topbar">

<div class="search">
<input type="text" placeholder="Cari siswa, guru, berita...">
</div>

<div class="profile">
<div class="avatar">A</div>
<div>
<b>Administrator</b><br>
<small>Premium Active</small>
</div>
</div>

</div>

<div class="cards">

<div class="card">
<div class="card-top">
<div>
<h4>Total Siswa</h4>
<div class="number">1.248</div>
</div>
<div class="icon blue">
<i class="fa-solid fa-user-graduate"></i>
</div>
</div>
</div>

<div class="card">
<div class="card-top">
<div>
<h4>Total Guru</h4>
<div class="number">82</div>
</div>
<div class="icon green">
<i class="fa-solid fa-chalkboard-user"></i>
</div>
</div>
</div>

<div class="card">
<div class="card-top">
<div>
<h4>Kelas Aktif</h4>
<div class="number">36</div>
</div>
<div class="icon orange">
<i class="fa-solid fa-school"></i>
</div>
</div>
</div>

<div class="card">
<div class="card-top">
<div>
<h4>Pendapatan</h4>
<div class="number">Rp12JT</div>
</div>
<div class="icon purple">
<i class="fa-solid fa-wallet"></i>
</div>
</div>
</div>

</div>

<div class="section">
<h3>📢 Pengumuman Terbaru</h3>
<br>
<p>Selamat datang di Dashboard EduSchool Premium.</p>
</div>

</div>

</body>
</html>
