<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Berita Sekolah - EduSchool Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* FORM */
.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input, textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-family:'Segoe UI';
}

textarea{
min-height:120px;
resize:none;
}

/* BUTTON */
.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

/* NEWS CARD */
.news-card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.news-title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.news-date{
font-size:12px;
color:#666;
margin-bottom:10px;
}

.news-content{
font-size:14px;
color:#333;
}

.badge{
padding:4px 10px;
border-radius:50px;
background:#16a34a;
color:white;
font-size:11px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1 class="title">📰 Berita Sekolah</h1>

<a href="dashboard.html">
<button class="btn btn-primary">⬅ Dashboard</button>
</a>
</div>

<!-- FORM -->
<div class="card">

<h3>Tambah Berita</h3>
<br>

<div class="form-grid">

<input type="text" id="title" placeholder="Judul berita">

<textarea id="content" placeholder="Isi berita..."></textarea>

<input type="date" id="date">

</div>

<br>

<button class="btn btn-primary" id="saveNews">
+ Publish
</button>

</div>

<!-- LIST NEWS -->
<div class="card">

<h3>📢 Daftar Berita</h3>
<br>

<div id="newsList">

<p style="text-align:center;color:#666;">
Belum ada berita
</p>

</div>

</div>

<script type="module" src="news.js"></script>

</body>
</html>
