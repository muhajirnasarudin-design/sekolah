<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Siswa - EduSchool Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:700;
color:#0f172a;
}

.btn{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

/* STATISTIK */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
}

.stat-title{
font-size:14px;
color:#64748b;
}

.stat-number{
font-size:32px;
font-weight:bold;
margin-top:10px;
color:#0f172a;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
}

textarea{
height:100px;
resize:none;
}

/* SEARCH */

.search-box{
position:relative;
}

.search-box i{
position:absolute;
left:15px;
top:14px;
color:#64748b;
}

.search-box input{
padding-left:40px;
}

/* TABLE */

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:14px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2563eb;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.action-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:5px;
font-size:13px;
}

.delete{
background:#dc2626;
color:white;
}

/* TOAST */

.toast{
display:none;
position:fixed;
top:20px;
right:20px;
padding:15px 20px;
border-radius:12px;
color:white;
font-weight:600;
z-index:99999;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.toast-success{
background:#16a34a;
}

.toast-error{
background:#dc2626;
}

.toast-warning{
background:#f59e0b;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
z-index:99999;
}

.modal-content{
background:white;
padding:25px;
width:90%;
max-width:400px;
border-radius:20px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

#cancelModal{
background:#e5e7eb;
}

#confirmModalBtn{
background:#dc2626;
color:white;
}

@media(max-width:768px){

.header{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

}

</style>
</head>
<body>

<!-- HEADER -->

<div class="header">

<h1 class="title">
🎓 Data Siswa
</h1>

<a href="dashboard.html">
<button class="btn btn-primary">
<i class="fa-solid fa-arrow-left"></i>
 Dashboard
</button>
</a>

</div>

<!-- STATISTIK -->

<div class="stats">

<div class="stat-card">
<div class="stat-title">
Total Siswa
</div>
<div class="stat-number" id="totalSiswa">
0
</div>
</div>

<div class="stat-card">
<div class="stat-title">
Laki-laki
</div>
<div class="stat-number" id="totalLaki">
0
</div>
</div>

<div class="stat-card">
<div class="stat-title">
Perempuan
</div>
<div class="stat-number" id="totalPerempuan">
0
</div>
</div>

</div>

<!-- FORM -->

<div class="card">

<h3>Tambah Siswa</h3>

<br>

<div class="form-grid">

<input
type="text"
id="nis"
placeholder="NIS">

<input
type="text"
id="nama"
placeholder="Nama Lengkap">

<input
type="text"
id="kelas"
placeholder="Kelas">

<select id="jk">

<option value="">
Pilih Jenis Kelamin
</option>

<option value="Laki-laki">
Laki-laki
</option>

<option value="Perempuan">
Perempuan
</option>

</select>

</div>

<br>

<textarea
id="alamat"
placeholder="Alamat siswa">
</textarea>

<br><br>

<button
id="saveBtn"
class="btn btn-primary">

<i class="fa-solid fa-plus"></i>
 Tambah Siswa

</button>

</div>

<!-- SEARCH -->

<div class="card">

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
id="searchInput"
placeholder="Cari siswa...">

</div>

</div>

<!-- TABLE -->

<div class="card">

<div class="table-container">

<table>

<thead>

<tr>
<th>Foto</th>
<th>NIS</th>
<th>Nama</th>
<th>Kelas</th>
<th>JK</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="studentTable">

<tr>
<td colspan="6"
style="text-align:center;">
Belum ada data siswa
</td>
</tr>

</tbody>

</table>

</div>

</div>

<!-- TOAST -->

<div id="toast" class="toast"></div>

<!-- MODAL -->

<div id="confirmModal" class="modal">

<div class="modal-content">

<h2 id="modalTitle">
Konfirmasi
</h2>

<br>

<p id="modalMessage">
Yakin?
</p>

<div class="modal-buttons">

<button id="cancelModal">
Batal
</button>

<button id="confirmModalBtn">
Ya
</button>

</div>

</div>

</div>

<script type="module" src="ui.js"></script>
<script type="module" src="students.js"></script>

</body>
</html>
