<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Siswa - EduSchool Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

.btn{
padding:12px 20px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
}

textarea{
resize:none;
height:100px;
}

.search-box{
position:relative;
}

.search-box input{
padding-left:40px;
}

.search-box i{
position:absolute;
left:15px;
top:14px;
color:#666;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.action-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
}

.edit{
background:#f59e0b;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2563eb;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
}

.stat-number{
font-size:30px;
font-weight:bold;
margin-top:10px;
}

@media(max-width:768px){

.header{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="header">

<div class="title">
🎓 Data Siswa
</div>

<button class="btn btn-primary">
<i class="fa-solid fa-arrow-left"></i>
 Dashboard
</button>

</div>

<div class="stats">

<div class="stat-card">
<h4>Total Siswa</h4>
<div class="stat-number" id="totalSiswa">
0
</div>
</div>

<div class="stat-card">
<h4>Siswa Laki-laki</h4>
<div class="stat-number" id="totalLaki">
0
</div>
</div>

<div class="stat-card">
<h4>Siswa Perempuan</h4>
<div class="stat-number" id="totalPerempuan">
0
</div>
</div>

</div>

<div class="card">

<h3>Tambah Siswa</h3>

<br>

<div class="form-grid">

<input
type="text"
id="nis"
placeholder="NIS">

<input
type="text"
id="nama"
placeholder="Nama Lengkap">

<input
type="text"
id="kelas"
placeholder="Kelas">

<select id="jk">
<option value="">
Pilih Jenis Kelamin
</option>

<option>
Laki-laki
</option>

<option>
Perempuan
</option>
</select>

</div>

<br>

<textarea
id="alamat"
placeholder="Alamat">
</textarea>

<br><br>

<button
id="saveBtn"
class="btn btn-primary">

<i class="fa-solid fa-plus"></i>
 Tambah Siswa

</button>

</div>

<div class="card">

<div class="search-box">

<i class="fa-solid fa-search"></i>

<input
type="text"
id="searchInput"
placeholder="Cari nama siswa...">

</div>

</div>

<div class="card">

<div class="table-container">

<table>

<thead>

<tr>
<th>Foto</th>
<th>NIS</th>
<th>Nama</th>
<th>Kelas</th>
<th>JK</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="studentTable">

<tr>

<td colspan="6"
style="text-align:center;">

Belum ada data siswa

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script type="module" src="students.js"></script>

</body>
</html>
