<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi - EduSchool</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{background:#f5f7fb;padding:20px;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{font-size:28px;font-weight:bold;color:#0f172a;}

.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{background:#2563eb;color:white;}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

.badge{
padding:5px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.hadir{background:#16a34a;}
.izin{background:#f59e0b;}
.alpha{background:#dc2626;}

.table-container{overflow-x:auto;}

table{width:100%;border-collapse:collapse;}

th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

canvas{width:100%!important;max-height:300px;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1 class="title">📋 Absensi Siswa</h1>

<a href="dashboard.html">
<button class="btn btn-primary">⬅ Dashboard</button>
</a>
</div>

<!-- FORM -->
<div class="card">

<h3>Tambah Absensi</h3><br>

<div class="form-grid">

<select id="classSelect">
<option value="">Pilih Kelas</option>
</select>

<select id="subjectSelect">
<option value="">Pilih Mapel</option>
</select>

<select id="studentName">
<option value="">Pilih Siswa</option>
</select>

<select id="status">
<option value="">Status</option>
<option value="hadir">Hadir</option>
<option value="izin">Izin</option>
<option value="alpha">Alpha</option>
</select>

<input type="date" id="date">

</div>

<br>

<button class="btn btn-primary" id="saveAttendance">Simpan</button>
<button class="btn btn-primary" onclick="exportPDF()">PDF</button>

</div>

<!-- STATS -->
<div class="card">
<h3>Statistik</h3><br>

<div class="form-grid">
<div>
<h4>Hadir</h4>
<h2 id="totalHadir">0</h2>
</div>

<div>
<h4>Izin</h4>
<h2 id="totalIzin">0</h2>
</div>

<div>
<h4>Alpha</h4>
<h2 id="totalAlpha">0</h2>
</div>
</div>
</div>

<!-- CHART -->
<div class="card">
<h3>Grafik Kehadiran</h3>
<canvas id="attendanceChart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table>
<thead>
<tr>
<th>Siswa</th>
<th>Kelas</th>
<th>Mapel</th>
<th>Status</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>
</div>

<script type="module" src="attendance.js"></script>

</body>
</html>
