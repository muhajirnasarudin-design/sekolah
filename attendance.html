<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi - EduSchool Premium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{background:#f5f7fb;padding:20px;}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{background:#2563eb;color:white;}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
}

.stat-box{
background:#fff;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat-box h2{font-size:28px;margin-top:10px;}

.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
color:white;
}

.hadir{background:#16a34a;}
.izin{background:#f59e0b;}
.alpha{background:#dc2626;}

.table-container{overflow-x:auto;}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

canvas{
width:100% !important;
max-height:300px;
}

.toast{
display:none;
position:fixed;
top:20px;
right:20px;
padding:15px;
border-radius:10px;
color:white;
z-index:9999;
}

.toast-success{background:#16a34a;}
.toast-error{background:#dc2626;}
.toast-warning{background:#f59e0b;}

</style>
</head>

<body>

<div class="header">
<h1 class="title">📋 Absensi Siswa</h1>

<a href="dashboard.html">
<button class="btn btn-primary">⬅ Dashboard</button>
</a>
</div>

<!-- FORM -->
<div class="card">
<h3>Tambah Absensi</h3><br>

<div class="form-grid">

<select id="studentName">
<option value="">Pilih Siswa</option>
</select>

<select id="status">
<option value="">Status</option>
<option value="hadir">Hadir</option>
<option value="izin">Izin</option>
<option value="alpha">Alpha</option>
</select>

<input type="date" id="date">

</div>

<br>

<button class="btn btn-primary" id="saveAttendance">+ Simpan</button>
<button class="btn btn-primary" onclick="exportPDF()">📄 PDF</button>

</div>

<!-- FILTER -->
<div class="card">
<h3>Filter Bulan</h3>
<input type="month" id="monthFilter">
</div>

<!-- STATS -->
<div class="card">
<h3>Statistik</h3><br>

<div class="form-grid">

<div class="stat-box">
<h4>Hadir</h4>
<h2 id="totalHadir">0</h2>
</div>

<div class="stat-box">
<h4>Izin</h4>
<h2 id="totalIzin">0</h2>
</div>

<div class="stat-box">
<h4>Alpha</h4>
<h2 id="totalAlpha">0</h2>
</div>

</div>
</div>

<!-- CHART -->
<div class="card">
<h3>Grafik Kehadiran</h3>
<canvas id="attendanceChart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table>
<thead>
<tr>
<th>Siswa</th>
<th>Status</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="attendance.js"></script>

</body>
</html>
