<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi - EduSchool Premium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

/* BUTTON */
.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* FORM */
.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* BADGE */
.badge{
padding:5px 10px;
border-radius:10px;
font-size:12px;
color:white;
}

.hadir{background:#16a34a;}
.izin{background:#f59e0b;}
.alpha{background:#dc2626;}

/* TABLE */
.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

/* CHART */
canvas{
width:100%!important;
max-height:300px;
}

/* QUICK BUTTONS */
.quick{
display:flex;
gap:10px;
flex-wrap:wrap;
}

/* STATS */
.stat-box{
text-align:center;
padding:10px;
}

.stat-box h2{
font-size:28px;
}

/* RESPONSIVE */
@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1 class="title">📋 Absensi Siswa</h1>

<a href="dashboard.html">
<button class="btn btn-primary">⬅ Dashboard</button>
</a>
</div>

<!-- FORM -->
<div class="card">

<h3>Tambah Absensi</h3><br>

<div class="form-grid">

<select id="classSelect">
<option value="">Pilih Kelas</option>
</select>

<select id="subjectSelect">
<option value="">Pilih Mapel</option>
</select>

<select id="studentName">
<option value="">Pilih Siswa</option>
</select>

<select id="status">
<option value="">Status</option>
<option value="hadir">Hadir</option>
<option value="izin">Izin</option>
<option value="alpha">Alpha</option>
</select>

<input type="date" id="date">

</div>

<br>

<button class="btn btn-primary" id="saveAttendance">Simpan</button>
<button class="btn btn-primary" onclick="exportPDF()">📄 PDF</button>

</div>

<!-- QUICK ACTION -->
<div class="card">
<h3>Aksi Cepat</h3><br>

<div class="quick">

<button class="btn btn-primary" onclick="quickAttendance('hadir')">
✔ Hadir Cepat
</button>

<button class="btn btn-primary" style="background:#dc2626" onclick="quickAttendance('alpha')">
✖ Tidak Hadir
</button>

</div>

</div>

<!-- STATISTIK -->
<div class="card">
<h3>Statistik</h3><br>

<div class="form-grid">

<div class="stat-box">
<h4>Hadir</h4>
<h2 id="totalHadir">0</h2>
</div>

<div class="stat-box">
<h4>Izin</h4>
<h2 id="totalIzin">0</h2>
</div>

<div class="stat-box">
<h4>Alpha</h4>
<h2 id="totalAlpha">0</h2>
</div>

</div>

</div>

<!-- CHART -->
<div class="card">
<h3>Grafik Kehadiran</h3>
<canvas id="attendanceChart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table>
<thead>
<tr>
<th>Siswa</th>
<th>Kelas</th>
<th>Mapel</th>
<th>Status</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="attendanceTable">
<tr>
<td colspan="5" style="text-align:center;">Belum ada data absensi</td>
</tr>
</tbody>

</table>

</div>
</div>

<script type="module" src="attendance.js"></script>

</body>
</html>
