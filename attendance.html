<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi - EduSchool Premium</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0f172a;
}

/* BUTTON */
.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:#2563eb;
color:white;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(15,23,42,.08);
margin-bottom:20px;
}

/* GRID */
.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

input, select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
}

/* SEARCH */
.search-box{
position:relative;
}

.search-box i{
position:absolute;
left:15px;
top:14px;
color:#666;
}

.search-box input{
padding-left:40px;
}

/* TABLE */
.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

/* STATUS */
.badge{
padding:6px 10px;
border-radius:10px;
font-size:12px;
font-weight:600;
}

.hadir{background:#16a34a;color:white;}
.izin{background:#f59e0b;color:white;}
.alpha{background:#dc2626;color:white;}

/* TOAST */
.toast{
display:none;
position:fixed;
top:20px;
right:20px;
padding:15px 20px;
border-radius:12px;
color:white;
font-weight:600;
z-index:9999;
}

.toast-success{background:#16a34a;}
.toast-error{background:#dc2626;}
.toast-warning{background:#f59e0b;}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.modal-buttons button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1 class="title">📋 Absensi Siswa</h1>

<a href="dashboard.html">
<button class="btn btn-primary">
<i class="fa-solid fa-arrow-left"></i> Dashboard
</button>
</a>
</div>

<!-- FORM -->
<div class="card">

<h3>Tambah Absensi</h3>
<br>

<div class="form-grid">

<select id="studentName">
<option value="">Pilih Siswa</option>
</select>

<select id="status">
<option value="">Status</option>
<option value="hadir">Hadir</option>
<option value="izin">Izin</option>
<option value="alpha">Alpha</option>
</select>

<input type="date" id="date">

</div>

<br>

<button id="saveAttendance" class="btn btn-primary">
<i class="fa-solid fa-plus"></i> Simpan Absensi
</button>

</div>

<!-- SEARCH -->
<div class="card">
<div class="search-box">
<i class="fa-solid fa-search"></i>
<input type="text" id="searchInput" placeholder="Cari absensi...">
</div>
</div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table>
<thead>
<tr>
<th>Siswa</th>
<th>Status</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="attendanceTable">
<tr>
<td colspan="4" style="text-align:center;">
Belum ada data absensi
</td>
</tr>
</tbody>

</table>

</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="confirmModal" class="modal">

<div class="modal-content">

<h2>Konfirmasi</h2>
<br>
<p>Yakin ingin menghapus data ini?</p>

<div class="modal-buttons">
<button id="cancelBtn">Batal</button>
<button id="confirmBtn">Hapus</button>
</div>

</div>
</div>

<script type="module" src="attendance.js"></script>

</body>
</html>
